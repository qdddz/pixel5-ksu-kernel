name: Build Pixel 6 KernelSU (Android 13/14) - Single Run

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 清理磁盘空间并配置大 Swap
        run: |
          sudo docker image prune --all --force
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
          sudo fallocate -l 16G /swapfile
          sudo chmod 600 /swapfile
          sudo mkswap /swapfile
          sudo swapon /swapfile
          
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev

      - name: 2. 配置 Repo 工具
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: 3. 同步 Pixel 6 (Raviole) 内核源码
        run: |
          mkdir kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b android-gs-raviole-5.10-android13-qpr3 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: 4. 自动化注入 KernelSU (GKI 模式)
        run: |
          cd kernel
          # GKI 核心内核源码位于 common 目录下，KernelSU 必须注入到这里
          cd common
          curl -LSs "https://raw.githubusercontent.com/tiann/KernelSU/main/kernel/setup.sh" | bash -s main

      - name: 5. 第一轮：编译 userdebug 版本
        run: |
          cd kernel
          export HOME=/home/runner
          export LTO=thin
          
          # 1. 动态寻找 GKI 的核心 defconfig
          DEFCONFIG=$(find . -name "gki_defconfig" | head -n 1)
          echo "🎯 Userdebug 目标配置: $DEFCONFIG"
          
          # 防御性安全检查
          if [ -z "$DEFCONFIG" ]; then
            echo "❌ 错误：未在源码树中找到 gki_defconfig 文件！"
            exit 1
          fi
          
          # 注入 KernelSU 必需的 Kprobes 依赖（变量务必用双引号包裹）
          echo "CONFIG_KPROBES=y" >> "$DEFCONFIG"
          echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG"
          
          # 2. 执行编译
          REAL_CONFIG=$(find . -name "build.config.raviole" | head -n 1 | sed 's|^\./||')
          BUILD_CONFIG=$REAL_CONFIG ./build/build.sh
          
          # 3. 捞出产物并重命名归档
          mkdir -p ../out_artifacts/userdebug
          cp $(find out/ -name "boot.img" | head -n 1) ../out_artifacts/userdebug/boot-userdebug.img || true
          cp $(find out/ -name "vendor_boot.img" | head -n 1) ../out_artifacts/userdebug/vendor_boot-userdebug.img || true
          echo "✅ Userdebug 编译完成并已成功提取。"

      - name: 6. 第二轮：编译 user 版本
        run: |
          cd kernel
          export HOME=/home/runner
          export LTO=thin
          
          # 1. 清理上一轮的输出目录，释放磁盘空间
          echo "🧹 正在清理上一轮的构建缓存..."
          rm -rf out
          
          # 2. 还原被修改的核心 defconfig（对 common 这个子仓库进行 checkout 重置）
          git -C common checkout arch/arm64/configs/gki_defconfig 2>/dev/null || true
          
          # 3. 重新获取并注入配置
          DEFCONFIG=$(find . -name "gki_defconfig" | head -n 1)
          echo "🎯 User 目标配置: $DEFCONFIG"
          
          if [ -z "$DEFCONFIG" ]; then
            echo "❌ 错误：未在源码树中找到 gki_defconfig 文件！"
            exit 1
          fi
          
          echo "CONFIG_KPROBES=y" >> "$DEFCONFIG"
          echo "CONFIG_HAVE_KPROBES=y" >> "$DEFCONFIG"
          echo "CONFIG_KPROBE_EVENTS=y" >> "$DEFCONFIG"
          
          # 剥离 user 版本的内核调试信息
          sed -i 's/CONFIG_DEBUG_INFO=y/CONFIG_DEBUG_INFO=n/g' "$DEFCONFIG"
          echo "CONFIG_DEBUG_KERNEL=n" >> "$DEFCONFIG"
          
          # 4. 执行第二轮编译
          REAL_CONFIG=$(find . -name "build.config.raviole" | head -n 1 | sed 's|^\./||')
          BUILD_CONFIG=$REAL_CONFIG ./build/build.sh
          
          # 5. 捞出 user 产物并重命名归档
          mkdir -p ../out_artifacts/user
          cp $(find out/ -name "boot.img" | head -n 1) ../out_artifacts/user/boot-user.img || true
          cp $(find out/ -name "vendor_boot.img" | head -n 1) ../out_artifacts/user/vendor_boot-user.img || true
          echo "✅ User 编译完成并已成功提取。"

      - name: 7. 统一打包上传所有定制镜像
        uses: actions/upload-artifact@v4
        with:
          name: Pixel6-KernelSU-DualVariants
          path: out_artifacts/
