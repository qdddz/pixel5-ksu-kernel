name: Build Pixel 5 KernelSU (Android 11)

on:
  workflow_dispatch: # 允许手动在 GitHub 页面点击按钮触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: 1. 彻底清理磁盘空间并安装构建依赖
        run: |
          sudo docker image prune --all --force
          
          # 更新包管理器
          sudo apt-get update
          
          # 修复依赖：删除了找不到的 libsdl1.1-dev，替换为 libsdl2-dev
          sudo apt-get install -y bc bison build-essential ccache curl flex g++-multilib gcc-multilib git gnupg gperf lib32readline-dev lib32z1-dev libelf-dev liblz4-tool libncurses5-dev libsdl2-dev libssl-dev libxml2 libxml2-utils lzop pngcrush rsync schedtool squashfs-tools xsltproc zip zlib1g-dev
      - name: 2. 配置 Repo 工具
        run: |
          mkdir -p ~/bin
          curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
          chmod a+x ~/bin/repo
          sudo ln -sf ~/bin/repo /usr/bin/repo
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"

      - name: 3. 同步 Pixel 5 内核源码
        run: |
          mkdir kernel && cd kernel
          repo init -u https://android.googlesource.com/kernel/manifest -b android-msm-redbull-4.19-android11-qpr2 --depth=1
          repo sync -c -j$(nproc) --no-tags --no-clone-bundle

      - name: 4. 集成 KernelSU 驱动
        run: |
          cd kernel/private/msm-google
          
          # 1. 彻底恢复被污染的顶层 Kconfig 和 Makefile
          git checkout drivers/Kconfig drivers/Makefile 2>/dev/null || true
          rm -rf drivers/KernelSU KernelSU
          
          # 2. 克隆 KernelSU 源码
          git clone https://github.com/tiann/KernelSU.git KernelSU
          
          # 3. 曲线救国：将 KernelSU 源码整个软链接到旧内核最稳定的 drivers/char/ 目录下
          ln -sf $(pwd)/KernelSU/kernel $(pwd)/drivers/char/KernelSU
          
          # 4. 将 KernelSU 注入到 drivers/char/ 的配置中（这里在任何内核编译架构下都绝对支持相对路径）
          if ! grep -q "KernelSU" drivers/char/Kconfig; then
              sed -i '/endmenu/i source "drivers/char/KernelSU/Kconfig"' drivers/char/Kconfig
          fi
          if ! grep -q "KernelSU" drivers/char/Makefile; then
              echo "obj-y += KernelSU/" >> drivers/char/Makefile
          fi
          
          # 5. 强制开启必要内核配置（写到原始红牛配置文件中）
          DEFCONFIG="arch/arm64/configs/vendor/redbull_defconfig"
          echo "CONFIG_MODULES=y" >> $DEFCONFIG
          echo "CONFIG_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_HAVE_KPROBES=y" >> $DEFCONFIG
          echo "CONFIG_KPROBE_EVENTS=y" >> $DEFCONFIG

      - name: 5. 执行内核编译
        run: |
          cd kernel
          export HOME=/home/runner
          
          # 自动寻找 redbull 的编译配置文件路径
          echo "=== 正在查找红牛平台的配置文件 ==="
          REAL_CONFIG=$(find . -name "build.config.redbull*" | head -n 1 | sed 's|^\./||')
          
          if [ -z "$REAL_CONFIG" ]; then
            echo "❌ 错误：未找到任何 build.config.redbull 配置文件！"
            echo "当前目录结构如下："
            find . -maxdepth 3 -name "build.config*"
            exit 1
          fi
          
          echo "🎯 成功找到配置文件，实际路径为: $REAL_CONFIG"
          
          # 使用找到的实际路径执行编译
          BUILD_CONFIG=$REAL_CONFIG ./build/build.sh
      - name: 5.5 在线合成定制 Boot 镜像
        run: |
          cd kernel
          # 下载官方提取出来的原厂 boot.img (这里以从远程或临时工具合成举例)
          # 最稳妥的做法：利用内核源码树自带的 mkbootimg 工具进行一键合成
          
          # 红牛平台的编译输出其实已经自动尝试去构建过 boot.img 了
          # 我们只需要把编译输出里已经基于新内核生成的最终 boot 捞出来即可
          cp out/android-msm-pixel-4.19/dist/boot.img out/android-msm-pixel-4.19/dist/KernelSU-boot.img || true
      - name: 6. 收集并上传编译产物
        uses: actions/upload-artifact@v4
        with:
          name: Pixel5-KernelSU-Build
          path: |
            kernel/out/android-msm-pixel-4.19/dist/Image.lz4-dtb
            kernel/out/android-msm-pixel-4.19/dist/vendor_boot.img
            kernel/out/android-msm-pixel-4.19/dist/KernelSU-boot.img
